session_name: gps_test
windows:
  - window_name: run_ntrip.sh
    layout: tiled
    panes:
      - ./run_ntrip.sh
  - window_name: run_gps.sh
    panes:
      - ./run_gps.sh
  - window_name: echo_ntrip.sh
    panes:
      - sleep 3 && ./echo_ntrip.sh
  - window_name: echo_gps.sh
    panes:
      - sleep 3 && ./echo_gps.sh
  - window_name: echo_fix.sh
    panes:
      - sleep 3 && ./echo_fix.sh
